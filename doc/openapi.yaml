openapi: 3.0.3
info:
  title: Sol CoffeeSys API (draft)
  version: 0.1.0
  description: Initial OpenAPI draft for backend APIs (first endpoints)
  contact:
    name: API support
servers:
  - url: http://localhost:8080
    description: Local dev

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
      description: >-
        HttpOnly refresh cookie used for rotation.
        Cookie attributes expected: HttpOnly; Secure; Path=/api/refresh; SameSite=Strict

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        password_hash:
          type: string
        role:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        reset_token:
          type: string
          nullable: true

    UserPublic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        message:
          type: string
        user:
          $ref: '#/components/schemas/UserPublic'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true

    CategoriesListResponse:
      type: object
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: integer
        is_available:
          type: boolean
        category_id:
          type: integer
        sku:
          type: string
        description:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        stock_quantity:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProductsListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
      
    CreateProductRequest:
      type: object
      required:
        - name
        - price
        - category_id
        - sku
        - stock_quantity
      properties:
        name:
          type: string
        price:
          type: integer
        is_available:
          type: boolean
        category_id:
          type: integer
        sku:
          type: string
        description:
          type: string
          nullable: true
        image_url:
          type: string
          nullable: true
        stock_quantity:
          type: integer

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          format: float
        category_id:
          type: integer
        created_at:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        total:
          type: integer
        status:
          type: string 
          enum: [pending, cancelled]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    OrderItem:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer
        unit_price:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      
    OrderWithItem:
      type: object
      properties:
        order:
          $ref: '#/components/schemas/Order'
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    OrdersListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderWithItem'
    
    CreateOrderResponse:
      type: object
      properties:
        order:
          $ref: '#/components/schemas/Order'

    CancelOrderResponse:
      type: object
      properties:
        order:
          $ref: '#/components/schemas/Order'
    
    SetUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, user]

    CartItem:
      type: object
      properties:
        id:
          type: integer
        cart_id: 
          type: integer
        product_id:
          type: integer
        quantity:
          type: integer
        price:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string 
          format: date-time
        product_name:
          type: string
        product_price:
          type: integer
        product_stock:
          type: integer

    CartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'

    AddToCartRequest:
      type: object
      required: [product_id, quantity]
      properties:
        product_id:
          type: integer
        quantity:
          type: integer
          minimum: 1

    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
          minimum: 1

    MeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserPublic'

tags:
  - name: Auth
    description: 認証用エンドポイント(register, login)
  - name: User
    description: ユーザー管理エンドポイント
  - name: Categories
    description: 商品カテゴリー管理
  - name: Products
    description: Product管理
  - name: Orders
    description: 注文管理（認証必須）
  - name: Cart
    description: カート操作（認証必須）

paths:
  /api/register:
    post:
      summary: Register a new user
      description: ユーザー登録用エンドポイント
      tags:
        - Auth
        - User
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/login:
    post:
      summary: Login and get JWT
      description: |
        ログインエンドポイント。成功時にアクセストークンとリフレッシュトークンを
        HttpOnly Cookie として返します。
        フロントエンドは `fetch` / `axios` を `credentials: 'include'` で呼び出してください。
      tags:
        - Auth
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/refresh:
    post:
      summary: Refresh access token using refresh cookie
      description: |
        `refresh_token`（HttpOnly Cookie）に含まれるリフレッシュトークンを検証し、
        新しいアクセストークン（および必要に応じて更新されたリフレッシュCookie）を返します。
        リクエストは `credentials: 'include'` が必要です。
      tags:
        - Auth
      operationId: refreshToken
      security:
        - cookieAuth: []
      responses:
        '200':
          description: OK
          headers:
            Set-Cookie:
              description: >
                Set-Cookie ヘッダでアクセストークン(access_token)とリフレッシュトークン(refresh_token)を HttpOnly Cookie として返す場合があります。例: `access_token=...; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=900` と `refresh_token=...; HttpOnly; Secure; SameSite=Strict; Path=/api/refresh; Max-Age=1209600`
              schema:
                type: string
              example: "refresh_token=eyJ...; HttpOnly; Secure; SameSite=Strict; Path=/api/refresh; Max-Age=1209600"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/refresh/revoke:
    post:
      summary: Revoke refresh token (リフレッシュトークンの破棄)
      description: >-
        HttpOnly の refresh_token Cookie を破棄します。ブラウザは Cookie を自動送信します。
        リクエストボディは不要です。CSRF対策（SameSite/トークンなど）を検討してください。
      tags:
        - Auth
      operationId: revokeRefreshToken
      security:
        - cookieAuth: []
      responses:
        '204':
          description: No Content — cookies cleared
          headers:
            Set-Cookie:
              description: Cookie をクリアする例（クライアント側で Cookie 削除を促すヘッダ）
              schema:
                type: string
              examples:
                clear:
                  summary: Clear access and refresh cookies
                  value: |
                    access_token=; Max-Age=0; Path=/; HttpOnly; Secure; SameSite=Lax
                    refresh_token=; Max-Age=0; Path=/api/refresh; HttpOnly; Secure; SameSite=Strict
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories:
    get:
      summary: List categories
      description: カテゴリー一覧を取得する
      tags:
        - Categories
      operationId: listCategories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoriesListResponse'
    post:
      summary: Create category (admin)
      description: カテゴリー登録
      tags:
        - Categories
      operationId: createCategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: 
          type: integer
    put:
      summary: Update category (admin)
      description: カテゴリー更新
      tags:
        - Categories
      operationId: updateCategory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete category (admin)
      description: カテゴリー削除
      tags:
        - Categories
      operationId: deleteCategory
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products:
    get:
      summary: List products
      description: 商品一覧取得
      tags:
        - Products
      operationId: listProducts
      parameters:
        - name: category_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductsListResponse'
    post:
      summary: Create product (admin)
      description: 商品登録
      tags:
        - Products
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get product by id
      description: 商品取得
      tags:
        - Products
      operationId: getProductById
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update product (admin)
      description: 商品更新
      tags:
        - Products
      operationId: updateProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (duplicate SKU)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete product (admin)
      description: 商品削除
      tags:
        - Products
      operationId: deleteProduct
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{id}/role:
    patch:
      summary: Set user role (admin)
      description: ユーザーのロールを変更する
      tags:
        - User
      operationId: setUserRole
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUserRoleRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/me:
    get:
      summary: Get current user profile
      description: Bearerトークンから現在のユーザー情報を取得
      tags:
        - User
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cart:
    get:
      summary: Get cart items
      description: 認証済みユーザーのカート内容を取得
      tags:
        - Cart
      operationId: getCart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Clear cart
      description: 認証済みユーザーのカートを空にする
      tags:
        - Cart
      operationId: clearCart
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cart/items:
    post:
      summary: Add item to cart
      description: カートに商品を追加
      tags:
        - Cart
      operationId: addToCart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/CartItem'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/cart/items/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    put:
      summary: Update cart item quantity
      description: カートアイテム数量を更新
      tags:
        - Cart
      operationId: updateCartItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    $ref: '#/components/schemas/CartItem'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cart item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove item from cart
      description: カートアイテムを削除
      tags:
        - Cart
      operationId: removeCartItem
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cart item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders:
    get:
      summary: List orders for authenticated user
      description: 認証済みユーザーの注文一覧を取得する。statusクエリで絞り込み可能。
      tags:
        - Orders
      operationId: getOrders
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, cancelled]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrdersListResponse'
        '400':
          description: Bad request (invalid status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create order from current cart
      description: 認証済みユーザーのカートをcheckoutして注文を作成する。
      tags:
        - Orders
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          description: Bad request (cart empty)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found (product missing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict (insufficient stock)
          content:
            application/json:
              schema:
