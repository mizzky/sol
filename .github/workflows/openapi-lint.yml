name: OpenAPI Lint

on:
  pull_request:
  push:
    paths:
      - 'doc/openapi.yaml'
      - '.spectral.yaml'

jobs:
  spectral:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run Spectral lint
        run: npx @stoplight/spectral lint --ruleset "spectral:oas" doc/openapi.yaml